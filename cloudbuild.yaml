steps:
  # Step 1: Fetch the secret and dynamically create .env.production
  - name: 'ubuntu'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "$$PUBLIC_ENV_VARS" > .env.production
    secretEnv: ['PUBLIC_ENV_VARS']

  # Step 2: Build the Docker image (Docker will see the generated .env.production)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/myai-nextjs:$COMMIT_SHA'
      - '.'

  # Step 3: Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/myai-nextjs:$COMMIT_SHA'

  # Step 4: Deploy the new image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'myai-nextjs'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/myai-nextjs:$COMMIT_SHA'
      - '--region'
      - 'us-central1'

# Tell Cloud Build where to find the secret
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_ENV/versions/latest
      env: 'PUBLIC_ENV_VARS'